name: YT Stream to MEGA Archiver

on:
  workflow_dispatch: # Pure manual trigger, no inputs needed

# ==========================================
# ⚙️ SCRIPT CONFIGURATION (EDIT THIS ONLY)
# ==========================================
env:
  STREAMER_NAME: "jaiyaxh"
  TARGET_URL: "https://www.youtube.com/@jaiyaxh/live"
  FILE_PREFIX: "1" # Use 2 for the second runner
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
# ==========================================

jobs:
  archive-stream:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies (yt-dlp, Deno, ffmpeg, MEGAcmd & WARP)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip unzip curl ffmpeg gnupg
          
          # Install yt-dlp, Deno & Hugging Face Hub
          pip3 install -U yt-dlp huggingface_hub requests urllib3
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          
          # Install MEGAcmd
          wget https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt install -y "$PWD/megacmd-xUbuntu_22.04_amd64.deb"
          
          # Install Cloudflare WARP repository and client
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

      - name: Set up YouTube Cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Connect Cloudflare WARP Tunnel
        run: |
          echo "Registering anonymous WARP client..."
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          echo "Connecting to WARP..."
          warp-cli --accept-tos connect
          
          # Give it a few seconds to establish the WireGuard handshake
          sleep 10
          
          # Verify the traffic is officially routing through Cloudflare
          echo "Checking routing status:"
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp

      - name: Setup Discord Webhook Script
        run: |
          # Creates an armored sub-script that yt-dlp will trigger when the stream goes live
          cat << 'EOF' > send_webhook.sh
          #!/bin/bash
          
          # Catch any unexpected fatal errors and force a successful exit to protect yt-dlp
          trap 'exit 0' ERR
          
          VIDEO_ID=$1
          
          if [ -z "$DISCORD_WEBHOOK" ]; then
            exit 0
          fi
          
          # The Anti-Spam Check: Only ping Discord if we haven't seen this specific video ID yet
          if [ ! -f "/tmp/webhook_sent_${VIDEO_ID}" ]; then
              # --max-time 5 ensures it won't hang yt-dlp if Discord's servers are down
              # || true ensures failures are completely ignored
              curl -s --max-time 5 -H "Content-Type: application/json" \
                   -d "{\"content\": \"🚨 **${STREAMER_NAME}** is LIVE!\nWatch here: https://youtube.com/watch?v=${VIDEO_ID}\", \"embeds\": [{\"image\": {\"url\": \"https://img.youtube.com/vi/${VIDEO_ID}/maxresdefault.jpg\"}}]}" \
                   "$DISCORD_WEBHOOK" > /dev/null 2>&1 || true
                   
              touch "/tmp/webhook_sent_${VIDEO_ID}" || true
          fi
          
          # Always return a 0 (success) to yt-dlp so the download proceeds flawlessly
          exit 0
          EOF
          chmod +x send_webhook.sh

      - name: Download Stream (WARP + Self-Healing Loop)
        run: |
          # Calculate timestamps for dynamic timeout
          START_TIME=$(date +%s)
          MAX_DURATION=$((340 * 60)) # 340 minutes in seconds
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((MAX_DURATION - ELAPSED))
            
            if [ $REMAINING -le 0 ]; then
              echo "🛑 Global timeout reached. Exiting loop..."
              break
            fi
            
            echo "▶️ Starting/Resuming yt-dlp download through WARP (Time left: $((REMAINING / 60)) minutes)..."
            
            # Disable GitHub's strict error failing so the 124 code doesn't crash the script
            set +e
            
            # Apply timeout DIRECTLY to yt-dlp. Added --exec to trigger the webhook!
            timeout --signal=SIGINT ${REMAINING}s yt-dlp \
              --cookies cookies.txt \
              --wait-for-video 60 \
              --downloader m3u8:native \
              -f "bestvideo+bestaudio/best" \
              --retries infinite \
              --fragment-retries infinite \
              --retry-sleep "fragment:exp=1:20" \
              --write-thumbnail \
              --embed-thumbnail \
              --embed-metadata \
              --remote-components ejs:github \
              --extractor-args "youtube:player_client=tv,web" \
              --exec "before_dl: ./send_webhook.sh %(id)s" \
              -o "${STREAMER_NAME}_${FILE_PREFIX}_%(title)s_part_%(epoch)s.%(ext)s" \
              "$TARGET_URL"
            
            EXIT_CODE=$?
            
            # Re-enable GitHub's strict error failing
            set -e
            
            # timeout command automatically returns 124 when it successfully stops a process
            if [ $EXIT_CODE -eq 124 ]; then
              echo "🛑 340-minute limit hit! yt-dlp gracefully stopped."
              break
            fi
            
            echo "⚠️ yt-dlp stopped. Verifying if stream ended..."
            sleep 15 
            
            # Silently check if the channel is still live
            if yt-dlp --cookies cookies.txt --match-filter "is_live" --simulate "$TARGET_URL" > /dev/null 2>&1; then
              echo "🔥 STREAM IS STILL LIVE! Reconnecting immediately..."
            else
              echo "✅ Stream is officially OFFLINE. Proceeding to upload..."
              break
            fi
          done

      - name: Sync Archive to Hugging Face Bucket
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TARGET_BUCKET: ${{ secrets.HF_TARGET_BUCKET }}
        run: |
          # 1. FAIL-SAFE DEPENDENCY CHECK
          # Force install the required modules RIGHT HERE so the step can never fail due to missing libraries.
          pip3 install -U huggingface_hub requests urllib3 > /dev/null 2>&1 || true

          # 2. DATE AND DIRECTORY SETUP
          FOLDER_DATE=$(TZ='Asia/Kolkata' date +'%-d %B %Y')
          STAGING_DIR="hf_upload/archives/${STREAMER_NAME}_${FOLDER_DATE}"
          
          # 3. SAFE FILE CHECK
          # Temporarily disable strict error failing so 'ls' doesn't crash the runner if files are missing
          set +e
          ls ${STREAMER_NAME}_${FILE_PREFIX}_* 1> /dev/null 2>&1
          FILES_EXIST=$?
          set -e
          
          if [ $FILES_EXIST -eq 0 ]; then
            echo "✅ Archive found. Preparing local staging directory..."
            mkdir -p "$STAGING_DIR"
            mv ${STREAMER_NAME}_${FILE_PREFIX}_* "$STAGING_DIR/"
            
            # 4. ROBUST PYTHON UPLOAD SCRIPT
            # Writing to a file prevents weird Bash quotation conflicts
            cat << 'EOF' > upload_script.py
          import os
          import time
          import sys
          from huggingface_hub import login, sync_bucket
          
          token = os.environ.get('HF_TOKEN')
          bucket = os.environ.get('HF_TARGET_BUCKET')
          
          print('🚀 Authenticating Hugging Face SDK...')
          try:
              login(token=token)
          except Exception as e:
              print(f"🚨 CRITICAL ERROR: Authentication failed. Check HF_TOKEN. {e}")
              sys.exit(1)
          
          # 5. THE RETRY LOOP (Self-Healing Upload)
          max_retries = 10  # Try up to 10 times if the network drops
          retry_delay = 30  # Wait 30 seconds between attempts
          
          for attempt in range(1, max_retries + 1):
              try:
                  print(f'\n⚡ Initiating Bucket sync to {bucket} (Attempt {attempt}/{max_retries})...')
                  # sync_bucket automatically resumes partial uploads!
                  sync_bucket('./hf_upload', f'hf://buckets/{bucket}')
                  print('\n✅ Hugging Face Sync completed successfully!')
                  break # Exit the loop, we are done!
              except Exception as e:
                  print(f'\n❌ Sync failed due to network or API error: {e}')
                  if attempt < max_retries:
                      print(f'⏳ Waiting {retry_delay} seconds before retrying...')
                      time.sleep(retry_delay)
                  else:
                      print('\n🚨 FATAL: All upload attempts failed after max retries.')
                      sys.exit(1)
          EOF
            
            # Execute the hardened script
            python3 upload_script.py
            
            echo "🧹 Cleaning up local staging files..."
            rm -rf hf_upload upload_script.py || true
          else
            echo "🛑 No stream files found. Nothing to upload."
          fi
